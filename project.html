const enc=new TextEncoder();
const dec=new TextDecoder();
function b64(s){const bin=atob(s);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return bytes;}
async function openPage(){
  const raw=b64(D),salt=raw.slice(0,16),iv=raw.slice(16,28),ct=raw.slice(28);
  const pass=document.getElementById('p').value;
  try{
    const material=await crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},material,{name:'AES-GCM',length:256},false,['decrypt']);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
    const html=dec.decode(plain);
    document.open();document.write(html);document.close();
  }catch(err){document.getElementById('e').textContent='Неверный пароль';}
}
document.getElementById('b').addEventListener('click',openPage);
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')openPage();});
